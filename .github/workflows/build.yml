name: Build Android APK (ARM64)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          mkdir -p output
          find . -name "*.apk" -exec cp {} output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arm64-apk
          path: android-app/output/*.apk
