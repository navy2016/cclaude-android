name: build-release

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Zig
        run: |
          curl -L https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz

      - name: Build Zig arm64 Android library
        run: |
          cd zig-core
          ../zig-linux-x86_64-0.13.0/zig build -Dtarget=aarch64-linux-android -Doptimize=ReleaseSafe
          mkdir -p ../android-app/zig-bridge/src/main/jniLibs/arm64-v8a
          SO_PATH=$(find zig-out -name 'libcclaude.so' | head -n 1)
          cp "$SO_PATH" ../android-app/zig-bridge/src/main/jniLibs/arm64-v8a/

      - name: Prepare Gradle
        run: |
          cd android-app
          chmod +x gradlew

      - name: Smoke checks
        run: |
          grep -R "ProviderSettingsSheet" -n android-app/app/src/main/java/com/cclaude
          grep -R "llmDrivenReAct" -n zig-core/src/runtime/c_api.zig

      - name: Build release APK
        run: |
          cd android-app
          ./gradlew assembleRelease

      - name: Collect release APK
        run: |
          mkdir -p release-out
          cp android-app/app/build/outputs/apk/release/*.apk release-out/app-arm64-v8a-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: release-out/app-arm64-v8a-release.apk
